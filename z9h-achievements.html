<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z9H — Achievements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050608;
    --surface:#0D0F14;
    --surface-alt:#12151B;
    --border:#202530;
    --platinum:#C6CED4;
    --signal:#4E89FF;
    --text:#F1F3F7;
    --text-dim:#8A9199;
    --text-faint:#54595E;
    --radius:16px;
    --path-accent:#4E89FF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  body{ display:flex; justify-content:center; min-height:100vh; }
  .app{ width:100%; max-width:430px; min-height:100vh; position:relative; padding-bottom:96px; }

  /* ---------- HEADER ---------- */
  header{ display:grid; grid-template-columns:32px 1fr 32px; align-items:center; column-gap:6px; padding:12px 16px 0 16px; }
  .back-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; flex-shrink:0; transition:opacity 0.2s ease; }
  .back-btn:active{ opacity:0.7; }
  .back-btn svg{ width:15px; height:15px; stroke:var(--text-dim); }
  .wordmark{ text-align:center; overflow:hidden; font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:clamp(28px, 9.5vw, 38px); letter-spacing:-0.5px; color:var(--text); line-height:1; white-space:nowrap; }
  .wordmark .accent-blue{ color:var(--signal); }
  .wordmark-tagline{ text-align:center; margin:8px 0 4px 0; font-family:'Oswald',sans-serif; font-weight:500; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--platinum); }
  .page-eyebrow{ text-align:center; font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--path-accent); font-weight:700; margin-bottom:18px; display:block; }

  .eyebrow{ font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:10px; display:block; }
  .section{ padding:0 20px; margin-bottom:16px; margin-top:22px; }

  /* ---------- STREAK CARD (moved here from Home Console) ---------- */
  .streak-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; display:flex; flex-direction:column; gap:18px; }
  .streak-left{ display:flex; flex-direction:column; }
  .streak-count{ display:flex; align-items:baseline; gap:6px; }
  .streak-num{ font-family:'Oswald',sans-serif; font-size:38px; font-weight:700; color:var(--text); line-height:1; }
  .streak-flame{ width:20px; height:20px; }
  .streak-label{ font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-top:6px; }
  .streak-msg{ font-size:12px; color:var(--text-dim); margin-top:4px; }

  .day-grid{ display:flex; flex-direction:column; gap:10px; }
  .day-row{ display:flex; gap:8px; }
  .day-row.weekday{ justify-content:space-between; }
  .day-row.weekend{ align-items:center; justify-content:space-between; border:1.5px dashed var(--border); border-radius:12px; padding:10px 16px; }
  .weekend-label{ font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--text-faint); font-weight:700; white-space:nowrap; }
  .weekend-dots{ display:contents; }
  .day-dot-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .day-letter{ font-size:9px; letter-spacing:0.4px; color:var(--text-faint); font-weight:700; }
  .day-dot{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--surface-alt); border:1px solid var(--border); }
  .day-dot.done{ background:var(--platinum); border-color:var(--platinum); }
  .day-dot.today{ background:var(--surface-alt); border:2px solid var(--signal); }
  .day-dot.done svg{ width:13px; height:13px; stroke:#050608; }

  /* ---------- PLACEHOLDER FOR FUTURE ACHIEVEMENT CONTENT ---------- */
  .coming-soon{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
  .coming-soon-title{ font-family:'Oswald',sans-serif; font-weight:600; text-transform:uppercase; font-size:13px; letter-spacing:0.5px; color:var(--text-dim); margin-bottom:6px; }
  .coming-soon-sub{ font-size:12px; color:var(--text-faint); }

  /* ---------- BOTTOM NAV (identical to Home Console) ---------- */
  nav{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(5,6,8,0.92); backdrop-filter:blur(14px); border-top:1px solid var(--border); display:flex; justify-content:space-around; align-items:center; padding:10px 4px calc(10px + env(safe-area-inset-bottom)) 4px; z-index:10; }
  .nav-item{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--text-faint); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; text-decoration:none; min-width:56px; min-height:52px; padding:4px 2px; border-radius:12px; position:relative; }
  .nav-item svg{ width:23px; height:23px; stroke:var(--text-faint); fill:none; }
  .nav-item.active{ color:var(--platinum); }
  .nav-item.active svg{ stroke:var(--platinum); }
  .nav-dot-alert{ position:absolute; top:2px; right:10px; width:6px; height:6px; border-radius:50%; background:var(--signal); }
</style>
</head>
<body>
<div class="app">

  <header>
    <button class="back-btn" id="backBtn" aria-label="Back to Home"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="wordmark">ZERO<span class="accent-blue">9</span>HUNDRED</div>
    <div></div>
  </header>

  <div class="wordmark-tagline">DISCIPLINE. FOCUS. STRENGTH.</div>
  <span class="page-eyebrow">Achievements</span>

  <div class="section" style="margin-top:0;">
    <span class="eyebrow">Discipline Streak</span>
    <div class="streak-card">
      <div class="streak-left">
        <div class="streak-count">
          <span class="streak-num">14</span>
          <svg class="streak-flame" viewBox="0 0 24 24" fill="none" stroke="var(--signal)" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 17a2.5 2.5 0 0 0 2.5-2.5c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7.5 7.5 0 1 1-15 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        </div>
        <span class="streak-label">Days Completed</span>
        <span class="streak-msg">Discipline compounds daily.</span>
      </div>
      <div class="day-grid">
        <div class="day-row weekday">
          <div class="day-dot-wrap"><span class="day-letter">MON</span><span class="day-dot done"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
          <div class="day-dot-wrap"><span class="day-letter">TUE</span><span class="day-dot done"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
          <div class="day-dot-wrap"><span class="day-letter">WED</span><span class="day-dot done"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
          <div class="day-dot-wrap"><span class="day-letter">THU</span><span class="day-dot today"></span></div>
          <div class="day-dot-wrap"><span class="day-letter">FRI</span><span class="day-dot"></span></div>
        </div>
        <div class="day-row weekend">
          <span class="weekend-label">Weekend Bonus</span>
          <div class="weekend-dots">
            <div class="day-dot-wrap"><span class="day-letter">SAT</span><span class="day-dot"></span></div>
            <div class="day-dot-wrap"><span class="day-letter">SUN</span><span class="day-dot"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <span class="eyebrow">Milestones &amp; Badges</span>
    <div class="coming-soon">
      <div class="coming-soon-title">Coming Soon</div>
      <div class="coming-soon-sub">Badge system and milestone tracking haven't been built yet.</div>
    </div>
  </div>

  <nav aria-label="Primary">
    <a href="z9h-home-screen-v2.html" class="nav-item"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a href="#" class="nav-item"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 9h6M15 9h6M3 15h6M15 15h6"/></svg>Training</a>
    <a href="#" class="nav-item"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-2 4 2 4H5"/></svg>Challenges</a>
    <a href="#" class="nav-item active"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10l-1 8a4 4 0 0 1-8 0L7 4z"/><path d="M5 4h2v4a3 3 0 0 1-3-3c0-.5.2-1 .5-1zM19 4h-2v4a3 3 0 0 0 3-3c0-.5-.2-1-.5-1z"/></svg>Achievements</a>
    <a href="#" class="nav-item"><span class="nav-dot-alert"></span><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Profile</a>
  </nav>

</div>

<script>
  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = 'z9h-home-screen-v2.html';
  });
</script>
</body>
</html>
