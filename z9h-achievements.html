<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z9H — Achievements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050608;
    --surface:#0D0F14;
    --surface-alt:#12151B;
    --border:#202530;
    --platinum:#C6CED4;
    --signal:#4E89FF;
    --text:#F1F3F7;
    --text-dim:#8A9199;
    --text-faint:#54595E;
    --radius:16px;
    --path-accent:#4E89FF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  body{ display:flex; justify-content:center; min-height:100vh; }
  .app{ width:100%; max-width:430px; min-height:100vh; position:relative; padding-bottom:96px; }

  /* ---------- HEADER ---------- */
  header{ display:grid; grid-template-columns:32px 1fr 32px; align-items:center; column-gap:6px; padding:12px 16px 0 16px; }
  .back-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--path-accent); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; flex-shrink:0; box-shadow:0 0 10px -2px color-mix(in srgb, var(--path-accent) 65%, transparent); transition:opacity 0.2s ease; }
  .back-btn:active{ opacity:0.7; }
  .back-btn svg{ width:15px; height:15px; stroke:var(--path-accent); }
  .logout-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; box-shadow:0 0 8px rgba(78,137,255,0.35); flex-shrink:0; transition:opacity 0.2s ease; }
  .logout-btn:active{ opacity:0.7; }
  .logout-btn svg{ width:15px; height:15px; stroke:var(--signal); }
  .wordmark .accent-blue{ color:var(--path-accent); }
  .wordmark{ text-align:center; overflow:hidden; font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:clamp(28px, 9.5vw, 38px); letter-spacing:-0.5px; color:var(--text); line-height:1; white-space:nowrap; }
  .wordmark-tagline{ text-align:center; margin:8px 0 4px 0; font-family:'Oswald',sans-serif; font-weight:500; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--platinum); }
  .page-eyebrow{ text-align:center; font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--path-accent); font-weight:700; margin-bottom:18px; display:block; }

  .eyebrow{ font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:10px; display:block; }
  .section{ padding:0 20px; margin-bottom:16px; margin-top:22px; }

  /* ---------- STREAK CARD (moved here from Home Console) ---------- */
  .streak-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; display:flex; flex-direction:column; gap:18px; }
  .streak-left{ display:flex; flex-direction:column; }
  .streak-count{ display:flex; align-items:baseline; gap:6px; }
  .streak-num{ font-family:'Oswald',sans-serif; font-size:38px; font-weight:700; color:var(--text); line-height:1; }
  .streak-flame{ width:20px; height:20px; }
  .streak-label{ font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-top:6px; }
  .streak-msg{ font-size:12px; color:var(--text-dim); margin-top:4px; }

  .day-grid{ display:flex; flex-direction:column; gap:10px; }
  .day-row{ display:flex; gap:8px; }
  .day-row.weekday{ justify-content:space-between; }
  .day-row.weekend{ align-items:center; justify-content:space-between; border:1.5px dashed var(--border); border-radius:12px; padding:10px 16px; }
  .weekend-label{ font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--text-faint); font-weight:700; white-space:nowrap; }
  .weekend-dots{ display:contents; }
  .day-dot-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .day-letter{ font-size:9px; letter-spacing:0.4px; color:var(--text-faint); font-weight:700; }
  .day-dot{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--surface-alt); border:1px solid var(--border); }
  .day-dot.done{ background:var(--platinum); border-color:var(--platinum); }
  .day-dot.today{ background:var(--surface-alt); border:2px solid var(--path-accent); }
  .day-dot.done.today{ background:var(--platinum); border:2px solid var(--path-accent); }
  .day-dot.done svg{ width:13px; height:13px; stroke:#050608; }

  .calendar-btn{ width:100%; margin-top:2px; padding:13px; border-radius:12px; border:1px solid var(--path-accent); background:color-mix(in srgb, var(--path-accent) 10%, transparent); color:var(--path-accent); font-family:'Inter'; font-weight:700; font-size:12.5px; letter-spacing:0.3px; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; transition:opacity 0.15s ease; }
  .calendar-btn svg{ width:15px; height:15px; flex-shrink:0; }
  .calendar-btn:active{ opacity:0.7; }

  /* ---------- MILESTONE BADGES (hex-frame language, matching Pathways) ---------- */
  .badge-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .badge-card{ display:flex; flex-direction:column; align-items:center; text-align:center; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 12px 16px 12px; transition:border-color 0.2s ease; }
  .badge-card.unlocked{ border-color:var(--path-accent); }

  .badge-frame{ position:relative; width:52px; height:52px; display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
  .badge-hex{ position:absolute; width:100%; height:100%; fill:none; stroke:var(--border); stroke-width:1.5; transition:stroke 0.2s ease; }
  .badge-card.unlocked .badge-hex{ stroke:var(--path-accent); filter:drop-shadow(0 0 6px color-mix(in srgb, var(--path-accent) 55%, transparent)); }
  .badge-icon{ width:20px; height:20px; stroke:var(--text-faint); stroke-width:1.8; fill:none; position:relative; z-index:1; transition:stroke 0.2s ease; }
  .badge-card.unlocked .badge-icon{ stroke:var(--path-accent); }

  .badge-name{ font-family:'Oswald',sans-serif; font-weight:600; text-transform:uppercase; font-size:12.5px; letter-spacing:0.2px; color:var(--text-faint); margin-bottom:4px; }
  .badge-card.unlocked .badge-name{ color:var(--text); }
  .badge-motto{ font-size:10px; line-height:1.4; color:var(--text-faint); min-height:26px; }
  .badge-card.unlocked .badge-motto{ color:var(--text-dim); }
  .badge-lock-label{ margin-top:8px; font-size:9px; letter-spacing:0.6px; text-transform:uppercase; color:var(--text-faint); font-weight:700; }
  .badge-card.unlocked .badge-lock-label{ color:var(--path-accent); }

  /* ---------- BOTTOM NAV (identical to Home Console) ---------- */
  nav{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(5,6,8,0.92); backdrop-filter:blur(14px); border-top:1px solid var(--border); display:flex; justify-content:space-around; align-items:center; padding:10px 4px calc(10px + env(safe-area-inset-bottom)) 4px; z-index:10; }
  .nav-item{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--text-faint); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; text-decoration:none; min-width:56px; min-height:52px; padding:4px 2px; border-radius:12px; position:relative; }
  .nav-item svg{ width:23px; height:23px; stroke:var(--text-faint); fill:none; }
  .nav-item.active{ color:var(--platinum); }
  .nav-item.active svg{ stroke:var(--platinum); }
  .nav-dot-alert{ position:absolute; top:2px; right:10px; width:6px; height:6px; border-radius:50%; background:var(--path-accent); }
</style>
</head>
<body>
<!-- Same defensive pattern as Home Console: deferred, nothing below assumes it loaded until checked. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<div class="app">

  <header>
    <button class="back-btn" id="backBtn" aria-label="Back to Home"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="wordmark">ZERO<span class="accent-blue">9</span>HUNDRED</div>
    <button class="logout-btn" id="logoutBtn" type="button" aria-label="Log out"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></button>
  </header>

  <div class="wordmark-tagline">DISCIPLINE. FOCUS. STRENGTH.</div>
  <span class="page-eyebrow">Achievements</span>

  <div class="section" style="margin-top:0;">
    <span class="eyebrow">Discipline Streak</span>
    <div class="streak-card">
      <div class="streak-left">
        <div class="streak-count">
          <span class="streak-num" id="streakNum">0</span>
          <svg class="streak-flame" viewBox="0 0 24 24" fill="none" stroke="var(--path-accent)" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 17a2.5 2.5 0 0 0 2.5-2.5c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7.5 7.5 0 1 1-15 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        </div>
        <span class="streak-label">Days Completed</span>
        <span class="streak-msg" id="streakMsg">Discipline compounds daily.</span>
      </div>
      <div class="day-grid">
        <div class="day-row weekday">
          <div class="day-dot-wrap" data-day="1"><span class="day-letter">MON</span><span class="day-dot"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
          <div class="day-dot-wrap" data-day="2"><span class="day-letter">TUE</span><span class="day-dot"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
          <div class="day-dot-wrap" data-day="3"><span class="day-letter">WED</span><span class="day-dot"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
          <div class="day-dot-wrap" data-day="4"><span class="day-letter">THU</span><span class="day-dot"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
          <div class="day-dot-wrap" data-day="5"><span class="day-letter">FRI</span><span class="day-dot"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
        </div>
        <div class="day-row weekend">
          <span class="weekend-label">Weekend Bonus</span>
          <div class="weekend-dots">
            <div class="day-dot-wrap" data-day="6"><span class="day-letter">SAT</span><span class="day-dot"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
            <div class="day-dot-wrap" data-day="0"><span class="day-letter">SUN</span><span class="day-dot"><svg viewBox="0 0 24 24" fill="none" stroke="#050608" stroke-width="3" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg></span></div>
          </div>
        </div>
      </div>
      <button class="calendar-btn" id="calendarBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
        View Calendar &amp; Log Past Sessions
      </button>
    </div>
  </div>

  <div class="section">
    <span class="eyebrow">Milestones &amp; Badges</span>
    <div class="badge-grid" id="badgeGrid"></div>
  </div>

  <nav aria-label="Primary">
    <a href="z9h-home-screen-v2.html" class="nav-item"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a href="#" class="nav-item"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 9h6M15 9h6M3 15h6M15 15h6"/></svg>Training</a>
    <a href="#" class="nav-item"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-2 4 2 4H5"/></svg>Challenges</a>
    <a href="#" class="nav-item active"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10l-1 8a4 4 0 0 1-8 0L7 4z"/><path d="M5 4h2v4a3 3 0 0 1-3-3c0-.5.2-1 .5-1zM19 4h-2v4a3 3 0 0 0 3-3c0-.5-.2-1-.5-1z"/></svg>Achievements</a>
    <a href="#" class="nav-item"><span class="nav-dot-alert"></span><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Profile</a>
  </nav>

</div>

<script>
  const Z9H = {
    get(key, fallback){ try{ const v = sessionStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } },
    set(key, value){ try{ sessionStorage.setItem(key, JSON.stringify(value)); }catch(e){} }
  };

  // ============================================================
  // ADAPTIVE THEME LAYER — same pattern as Home Console / Mission.
  // ============================================================
  const PATH_COLORS = {
    calisthenics: '#4E89FF',
    running:      '#FF8A00',
    strength:     '#FF3B30',
    movement:     '#CCFF00',
    breathwork:   '#00E5FF',
    mind:         '#AF52DE'
  };
  (function applyPathTheme(){
    const storedAccent = Z9H.get('z9h_path_accent', null);
    const storedPath = Z9H.get('z9h_active_path', 'calisthenics');
    const accent = storedAccent || PATH_COLORS[storedPath] || PATH_COLORS.calisthenics;
    document.documentElement.style.setProperty('--path-accent', accent);
  })();

  // ============================================================
  // Z9H DATA CLIENT — real Supabase wiring. withTimeout wrapper on
  // every call per Z9H standing rules.
  // ============================================================
  var SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';

  function withTimeout(promise, ms) {
    ms = ms || 10000;
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('timeout')), ms);
      promise.then(
        val => { clearTimeout(timer); resolve(val); },
        err => { clearTimeout(timer); reject(err); }
      );
    });
  }

  // Uses LOCAL calendar date components — not toISOString(), which converts
  // to UTC first and can silently roll the date back or forward a day for
  // anyone not in UTC+0 (e.g. BST).
  function dateKey(d){
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  // ============================================================
  // MILESTONE BADGES — 14 total across 4 tracking types. All read
  // from data already in the schema; none require new columns:
  //   streak       -> profiles.longest_streak (already ratchets up permanently)
  //   total        -> COUNT of the user's mission_completions rows
  //   session_time -> whether any single completion hit a time_minutes threshold
  //   comeback     -> gap-detection over the user's completed_date history
  // Focus (no-skipped-exercises) is deliberately excluded — per-set
  // completion isn't persisted anywhere yet, so it can't be earned honestly.
  // ============================================================
  const BADGES = [
    { id: 'first_step',  name: 'First Step',       motto: 'Complete your first mission.',                    type: 'streak',       threshold: 1,   icon: 'target' },
    { id: 'streak_7',    name: '7 Day Streak',     motto: 'A week of discipline. The habit is built.',       type: 'streak',       threshold: 7,   icon: 'flame'  },
    { id: 'streak_14',   name: '14 Day Streak',    motto: 'Two weeks of focus. Keep pushing.',                type: 'streak',       threshold: 14,  icon: 'flame'  },
    { id: 'streak_30',   name: 'Disciplined',      motto: 'A month of consistency. You\u2019re levelling up.', type: 'streak',      threshold: 30,  icon: 'flame'  },
    { id: 'streak_60',   name: 'Built Different',  motto: 'Two months strong. Unstoppable.',                  type: 'streak',       threshold: 60,  icon: 'flame'  },
    { id: 'streak_100',  name: 'Unstoppable',      motto: 'A true milestone. You\u2019re elite.',              type: 'streak',       threshold: 100, icon: 'flame'  },
    { id: 'streak_365',  name: 'Elite Discipline', motto: '365 days in a row. You live the mission.',         type: 'streak',       threshold: 365, icon: 'flame'  },
    { id: 'total_10',    name: 'Consistent',       motto: 'Complete 10 missions in total.',                   type: 'total',        threshold: 10,  icon: 'bars'   },
    { id: 'total_25',    name: 'Strength Builder', motto: 'Complete 25 missions in total.',                   type: 'total',        threshold: 25,  icon: 'arm'    },
    { id: 'total_150',   name: 'Calisthenics King', motto: 'Complete 150 missions in total.',                 type: 'total',        threshold: 150, icon: 'crown'  },
    { id: 'total_900',   name: '900 Club',         motto: 'Complete 900 missions. You live the mission.',     type: 'total',        threshold: 900, icon: 'bars'   },
    { id: 'time_15',     name: 'Time Invested',    motto: 'Complete a 15-minute session.',                    type: 'session_time', threshold: 15,  icon: 'clock'  },
    { id: 'time_30',     name: 'Time Master',      motto: 'Complete a 30-minute session.',                    type: 'session_time', threshold: 30,  icon: 'clock'  },
    { id: 'comeback',    name: 'Comeback',         motto: 'Return and complete a mission after missing 3+ days.', type: 'comeback',  icon: 'flag'   }
  ];

  const BADGE_ICONS = {
    target: '<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>',
    flame:  '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 17a2.5 2.5 0 0 0 2.5-2.5c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7.5 7.5 0 1 1-15 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',
    bars:   '<path d="M6 20v-6M12 20V8M18 20v-11"/>',
    arm:    '<path d="M4 15s1.5-1 4-1 4 2 8 2 4-1 4-1M9 6l3-2.5L15 6M12 3.5V11"/>',
    crown:  '<path d="M4 17h16l-1.5-8-4 3-2.5-5-2.5 5-4-3L4 17z"/>',
    clock:  '<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v5l3 2.5"/>',
    flag:   '<path d="M5 3v18M5 4h11l-2 4 2 4H5"/>'
  };

  function isUnlocked(badge, stats) {
    switch (badge.type) {
      case 'streak': return stats.longestStreak >= badge.threshold;
      case 'total': return stats.totalCompletions >= badge.threshold;
      case 'session_time': return badge.threshold >= 30 ? stats.hasSession30 : stats.hasSession15;
      case 'comeback': return stats.comebackUnlocked;
      default: return false;
    }
  }

  function lockLabel(badge) {
    switch (badge.type) {
      case 'streak': return `Reach ${badge.threshold} Days`;
      case 'total': return `Complete ${badge.threshold} Missions`;
      case 'session_time': return `Complete a ${badge.threshold}-Min Session`;
      case 'comeback': return 'Miss 3+ Days, Then Return';
      default: return 'Locked';
    }
  }

  function renderBadges(stats) {
    const grid = document.getElementById('badgeGrid');
    grid.innerHTML = BADGES.map(b => {
      const unlocked = isUnlocked(b, stats);
      return `
        <div class="badge-card${unlocked ? ' unlocked' : ''}">
          <div class="badge-frame">
            <svg class="badge-hex" viewBox="0 0 100 100"><polygon points="50,2 93,26 93,74 50,98 7,74 7,26"/></svg>
            <svg class="badge-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">${BADGE_ICONS[b.icon]}</svg>
          </div>
          <div class="badge-name">${b.name}</div>
          <div class="badge-motto">${b.motto}</div>
          <div class="badge-lock-label">${unlocked ? 'Unlocked' : lockLabel(b)}</div>
        </div>
      `;
    }).join('');
  }

  function parseDateKey(key) {
    const [y, m, d] = key.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function loadStreakAndWeek() {
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    withTimeout(client.auth.getSession())
      .then(result => {
        if (result.error) throw result.error;
        const user = result.data && result.data.session && result.data.session.user;
        if (!user) {
          window.location.href = 'index.html';
          return null;
        }

        // Full history in one call — feeds the weekly dots (filtered client-side),
        // total-completions badges, session-time badges, and comeback detection.
        // No separate count query needed; this dataset answers all of them.
        return Promise.all([
          withTimeout(client.from('profiles').select('current_streak, longest_streak').eq('id', user.id).single()),
          withTimeout(client.from('mission_completions').select('completed_date, time_minutes')
            .eq('user_id', user.id)
            .order('completed_date', { ascending: true }))
        ]);
      })
      .then(results => {
        if (!results) return; // redirected to login above
        const [profileResult, historyResult] = results;
        if (profileResult.error) throw profileResult.error;
        if (historyResult.error) throw historyResult.error;

        const streak = (profileResult.data && profileResult.data.current_streak) || 0;
        const longestStreak = (profileResult.data && profileResult.data.longest_streak) || 0;
        const history = historyResult.data || [];
        const completedDates = new Set(history.map(row => row.completed_date));

        document.getElementById('streakNum').textContent = streak;
        document.getElementById('streakMsg').textContent =
          streak > 0 ? 'Discipline compounds daily.' : 'Complete a mission to start your streak.';

        // ---- Derive badge stats from the same history fetch ----
        const totalCompletions = history.length;
        const hasSession15 = history.some(row => row.time_minutes >= 15);
        const hasSession30 = history.some(row => row.time_minutes >= 30);

        // Comeback: walk consecutive completions looking for a gap of 3+
        // full missed days between two logged dates.
        let comebackUnlocked = false;
        for (let i = 1; i < history.length; i++) {
          const prev = parseDateKey(history[i - 1].completed_date);
          const curr = parseDateKey(history[i].completed_date);
          const gapDays = Math.round((curr - prev) / 86400000) - 1; // days missed in between
          if (gapDays >= 3) { comebackUnlocked = true; break; }
        }

        renderBadges({ longestStreak, totalCompletions, hasSession15, hasSession30, comebackUnlocked });

        const now = new Date();
        const todayDow = now.getDay();
        const mondayOffset = todayDow === 0 ? -6 : 1 - todayDow;
        const monday = new Date(now);
        monday.setDate(now.getDate() + mondayOffset);

        document.querySelectorAll('.day-dot-wrap').forEach(wrap => {
          const dow = Number(wrap.getAttribute('data-day'));
          const offsetFromMonday = dow === 0 ? 6 : dow - 1;
          const cellDate = new Date(monday);
          cellDate.setDate(monday.getDate() + offsetFromMonday);
          const key = dateKey(cellDate);
          const dot = wrap.querySelector('.day-dot');

          if (completedDates.has(key)) dot.classList.add('done');
          if (key === dateKey(now)) dot.classList.add('today');
        });
      })
      .catch(err => {
        console.warn('Failed to load streak/week data:', err.message);
        document.getElementById('streakMsg').textContent = 'Could not load streak data.';
      });
  }

  // Guard against the CDN script (deferred) not having loaded yet by the
  // time this synchronous script runs — same real-world race condition
  // documented from the login page build. Retry rather than fail once.
  function waitForSupabase(callback, retries) {
    retries = retries || 0;
    if (typeof window.supabase !== 'undefined') {
      callback();
    } else if (retries >= 10) {
      document.getElementById('streakMsg').textContent = 'Could not load — refresh the page.';
    } else {
      setTimeout(() => waitForSupabase(callback, retries + 1), 500);
    }
  }

  waitForSupabase(loadStreakAndWeek);

  document.getElementById('calendarBtn').addEventListener('click', () => {
    window.location.href = 'z9h-achievement-calendar.html';
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = 'z9h-home-screen-v2.html';
  });
</script>
