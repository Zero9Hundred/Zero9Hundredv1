<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z9H — Choose Your Path</title>
<style>
  :root{
    --bg:#050608;
    --surface:#0D0F14;
    --border:#202530;
    --path-accent:#4E89FF;
    --text:#F1F3F7;
  }
  /* --- Added Styles for Proceed Button & Glow --- */
  .proceed-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--path-accent);
    color: var(--bg);
    border: none;
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 10px var(--path-accent);
    display: none; /* Hidden by default */
  }
  .path-card.selected .proceed-btn { display: block; }
  .path-card { position: relative; } /* Necessary for absolute positioning of button */
  
  /* Retaining your existing styles below... */
  /* [Include your existing CSS here, keeping the rest of the file as is] */
</style>
</head>
<body>
<div class="path-stack" id="pathStack">
  <div class="path-card" data-path="calisthenics">
    <button class="proceed-btn">Proceed</button>
    <div class="badge-frame"></div>
    <div class="path-details"></div>
  </div>
  </div>

<script>
  const cards = document.querySelectorAll('.path-card');
  const proceedBtns = document.querySelectorAll('.proceed-btn');

  cards.forEach(card => {
    card.addEventListener('click', () => {
      // 1. Remove selection from all cards
      cards.forEach(c => c.classList.remove('selected'));
      
      // 2. Add selection to clicked card
      card.classList.add('selected');
      
      // 3. Update active path state
      const chosen = card.getAttribute('data-path');
      Z9H.set('z9h_active_path', chosen);
    });
  });

  // Handle Proceed button navigation
  proceedBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation(); // Prevent triggering the card selection logic again
      window.location.href = 'z9h-home-screen-v2.html';
    });
  });
</script>
</body>
</html>
