<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z9H — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050608;
    --surface:#0D0F14;
    --surface-alt:#12151B;
    --border:#202530;
    --platinum:#C6CED4;
    --signal:#4E89FF;
    --text:#F1F3F7;
    --text-dim:#8A9199;
    --text-faint:#54595E;
    --radius:16px;
    --path-accent:#4E89FF;
    --nav-bg:rgba(5,6,8,0.92);
    --watermark-opacity:0.03;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; transition:background 0.2s ease, color 0.2s ease;}
  body{ display:flex; justify-content:center; min-height:100vh; }
  .app{ width:100%; max-width:430px; min-height:100vh; position:relative; padding-bottom:96px; }

  /* ---------- HEADER ---------- */
  header{ display:grid; grid-template-columns:32px 1fr 32px; align-items:center; column-gap:6px; padding:12px 16px 0 16px; }
  .back-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--path-accent); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; flex-shrink:0; box-shadow:0 0 10px -2px color-mix(in srgb, var(--path-accent) 65%, transparent); transition:opacity 0.2s ease; }
  .back-btn:active{ opacity:0.7; }
  .back-btn svg{ width:15px; height:15px; stroke:var(--path-accent); }
  .logout-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; box-shadow:0 0 8px rgba(78,137,255,0.35); flex-shrink:0; transition:opacity 0.2s ease; }
  .logout-btn:active{ opacity:0.7; }
  .logout-btn svg{ width:15px; height:15px; stroke:var(--signal); }
  .wordmark{ text-align:center; overflow:hidden; font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:clamp(28px, 9.5vw, 38px); letter-spacing:-0.5px; color:var(--text); line-height:1; white-space:nowrap; }
  .wordmark .accent-blue{ color:var(--path-accent); }
  .wordmark-tagline{ text-align:center; margin:8px 0 4px 0; font-family:'Oswald',sans-serif; font-weight:500; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--platinum); }
  .page-eyebrow{ text-align:center; font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--path-accent); font-weight:700; margin-bottom:18px; display:block; }

  .eyebrow{ font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:10px; display:block; }
  .section{ padding:0 20px; margin-bottom:16px; margin-top:22px; }

  /* ---------- ACCOUNT CARD ---------- */
  .account-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; display:flex; align-items:center; gap:14px; }
  .account-avatar{ width:48px; height:48px; border-radius:50%; background:var(--surface-alt); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .account-avatar svg{ width:22px; height:22px; stroke:var(--path-accent); fill:none; }
  .account-info{ min-width:0; }
  .account-name{ font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:16px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .account-email{ font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:3px; }

  /* ---------- THEME TOGGLE ---------- */
  .theme-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
  .theme-row{ display:flex; align-items:center; justify-content:space-between; }
  .theme-label{ font-family:'Oswald',sans-serif; font-weight:600; text-transform:uppercase; font-size:13px; color:var(--text); }
  .theme-sub{ font-size:11px; color:var(--text-faint); margin-top:3px; }
  .theme-switch{ display:flex; background:var(--surface-alt); border:1px solid var(--border); border-radius:12px; padding:3px; gap:3px; flex-shrink:0; }
  .theme-option{ display:flex; align-items:center; gap:6px; padding:8px 13px; border-radius:9px; border:none; background:transparent; color:var(--text-dim); font-family:'Inter'; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.3px; cursor:pointer; transition:all 0.15s ease; }
  .theme-option svg{ width:14px; height:14px; stroke:currentColor; fill:none; flex-shrink:0; }
  .theme-option.active{ background:var(--path-accent); color:var(--bg); box-shadow:0 0 10px -2px color-mix(in srgb, var(--path-accent) 60%, transparent); }
  .theme-status{ font-size:10.5px; color:var(--text-faint); margin-top:10px; min-height:14px; }

  /* ---------- COMING SOON ---------- */
  .coming-soon{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
  .coming-soon-title{ font-family:'Oswald',sans-serif; font-weight:600; text-transform:uppercase; font-size:13px; letter-spacing:0.5px; color:var(--text-dim); margin-bottom:6px; }
  .coming-soon-sub{ font-size:12px; color:var(--text-faint); }

  /* ---------- BOTTOM NAV ---------- */
  nav{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(--nav-bg); backdrop-filter:blur(14px); border-top:1px solid var(--border); display:flex; justify-content:space-around; align-items:center; padding:10px 4px calc(10px + env(safe-area-inset-bottom)) 4px; z-index:10; }
  .nav-item{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--text-faint); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; text-decoration:none; min-width:56px; min-height:52px; padding:4px 2px; border-radius:12px; position:relative; }
  .nav-item svg{ width:23px; height:23px; stroke:var(--text-faint); fill:none; }
  .nav-item.active{ color:var(--platinum); }
  .nav-item.active svg{ stroke:var(--platinum); }
</style>
</head>
<body>
<script>
  // ============================================================
  // THEME LAYER — must run before anything paints, or the page
  // flashes the wrong theme for a frame. Applies the cached choice
  // instantly; the main script below reconciles against the real
  // profile once Supabase is available, in case it changed on
  // another device.
  // ============================================================
  (function(){
    var THEMES = {
      dark:  { bg:'#050608', surface:'#0D0F14', surfaceAlt:'#12151B', border:'#202530', platinum:'#C6CED4', text:'#F1F3F7', textDim:'#8A9199', textFaint:'#54595E', navBg:'rgba(5,6,8,0.92)', watermarkOpacity:'0.03' },
      light: { bg:'#EEF0F3', surface:'#FFFFFF', surfaceAlt:'#F4F5F8', border:'#D8DBE1', platinum:'#3A3F47', text:'#14161A', textDim:'#5C6169', textFaint:'#9AA0A8', navBg:'rgba(255,255,255,0.92)', watermarkOpacity:'0.045' }
    };
    function applyThemeMode(mode){
      var t = THEMES[mode] || THEMES.dark;
      var r = document.documentElement.style;
      r.setProperty('--bg', t.bg);
      r.setProperty('--surface', t.surface);
      r.setProperty('--surface-alt', t.surfaceAlt);
      r.setProperty('--border', t.border);
      r.setProperty('--platinum', t.platinum);
      r.setProperty('--text', t.text);
      r.setProperty('--text-dim', t.textDim);
      r.setProperty('--text-faint', t.textFaint);
      r.setProperty('--nav-bg', t.navBg);
      r.setProperty('--watermark-opacity', t.watermarkOpacity);
    }
    var cached = null;
    try { cached = sessionStorage.getItem('z9h_theme_mode'); } catch(e){}
    applyThemeMode(cached || 'dark');
    window.__z9hApplyThemeMode = applyThemeMode;
  })();
</script>
<!-- Same defensive pattern as elsewhere: deferred, nothing below assumes it loaded until checked. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

    <div class="wordmark">ZERO<span class="accent-blue">9</span>HUNDRED</div>
    <button class="logout-btn" id="logoutBtn" type="button" aria-label="Log out"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></button>

    <div class="account-card">
      <div class="account-avatar"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></div>

  <div class="section">

<script>
  const Z9H = {
    get(key, fallback){ try{ const v = sessionStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } },
    set(key, value){ try{ sessionStorage.setItem(key, JSON.stringify(value)); }catch(e){} }
  };

  const PATH_COLORS = {
    calisthenics: '#4E89FF',
    running:      '#FF8A00',
    strength:     '#FF3B30',
    movement:     '#22C55E',
    breathwork:   '#00E5FF',
    mind:         '#AF52DE'
  };
  (function applyPathTheme(){
    const storedAccent = Z9H.get('z9h_path_accent', null);
    const storedPath = Z9H.get('z9h_active_path', 'calisthenics');
    const accent = storedAccent || PATH_COLORS[storedPath] || PATH_COLORS.calisthenics;
    document.documentElement.style.setProperty('--path-accent', accent);
  })();

  var SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';

  function withTimeout(promise, ms) {
    ms = ms || 10000;
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('timeout')), ms);
      promise.then(
        val => { clearTimeout(timer); resolve(val); },
        err => { clearTimeout(timer); reject(err); }
      );
    });
  }

  const darkOption = document.getElementById('darkOption');
  const lightOption = document.getElementById('lightOption');
  const themeStatus = document.getElementById('themeStatus');

  function setToggleState(mode) {
    darkOption.classList.toggle('active', mode === 'dark');
    lightOption.classList.toggle('active', mode === 'light');
  }

  let client = null;
  let currentUser = null;

  function selectTheme(mode) {
    setToggleState(mode);
    window.__z9hApplyThemeMode(mode);
    Z9H.set('z9h_theme_mode', mode);
    if (!client || !currentUser) return;

    themeStatus.textContent = 'Saving\u2026';
    withTimeout(client.from('profiles').update({ theme_mode: mode }).eq('id', currentUser.id))
      .then(result => {
        if (result.error) throw result.error;
        themeStatus.textContent = 'Saved \u2014 applies on every screen.';
      })
      .catch(err => {
        console.warn('Failed to save theme:', err.message);
        themeStatus.textContent = 'Applied here, but couldn\u2019t save \u2014 check your connection.';
      });
  }

  darkOption.addEventListener('click', () => selectTheme('dark'));
  lightOption.addEventListener('click', () => selectTheme('light'));

  function waitForSupabase(callback, retries) {
    retries = retries || 0;
    if (typeof window.supabase !== 'undefined') {
      callback();
    } else if (retries >= 10) {
      themeStatus.textContent = 'Could not load \u2014 refresh the page.';
    } else {
      setTimeout(() => waitForSupabase(callback, retries + 1), 500);
    }
  }

  function loadProfile() {
    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    withTimeout(client.auth.getSession())
      .then(result => {
        if (result.error) throw result.error;
        const user = result.data && result.data.session && result.data.session.user;
        if (!user) {
          window.location.href = 'index.html';
          return null;
        }
        currentUser = user;
        document.getElementById('accountEmail').textContent = user.email || '\u2014';

        return withTimeout(client.from('profiles').select('display_name, theme_mode').eq('id', user.id).single());
      })
      .then(result => {
        if (!result) return; // redirected to login above
        if (result.error) throw result.error;

        document.getElementById('accountName').textContent = (result.data && result.data.display_name) || 'Z9H Operator';

        // Reconcile against the real saved preference — the cached value
        // applied instantly on load might be stale if it was changed on
        // another device since this browser last checked.
        const savedMode = (result.data && result.data.theme_mode) || 'dark';
        const cachedMode = Z9H.get('z9h_theme_mode', 'dark');
        setToggleState(savedMode);
        if (savedMode !== cachedMode) {
          window.__z9hApplyThemeMode(savedMode);
          Z9H.set('z9h_theme_mode', savedMode);
        }
      })
      .catch(err => {
        console.warn('Failed to load profile:', err.message);
        document.getElementById('accountName').textContent = 'Z9H Operator';
      });
  }

  waitForSupabase(loadProfile);

  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = 'z9h-home-screen-v2.html';
  });
</script>

<!-- ============================================================
     LOGOUT — same self-contained pattern used across the app.
============================================================ -->
<script defer>
(function () {
  var SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';
  var LOGIN_URL = 'index.html';

  function attachLogout() {
    var btn = document.getElementById('logoutBtn');
    if (!btn) return;

    btn.addEventListener('click', function () {
      btn.disabled = true;

      if (typeof window.supabase === 'undefined') {
        window.location.href = LOGIN_URL;
        return;
      }

      try {
        var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        client.auth.signOut().finally(function () {
          window.location.href = LOGIN_URL;
        });
      } catch (err) {
        console.warn('Sign out failed:', err.message);
        window.location.href = LOGIN_URL;
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attachLogout);
  } else {
    attachLogout();
  }
})();
</script>
