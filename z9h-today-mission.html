<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z9H — Today's Mission</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050608;
    --surface:#0D0F14;
    --surface-alt:#12151B;
    --border:#202530;
    --platinum:#C6CED4;
    --signal:#4E89FF;
    --text:#F1F3F7;
    --text-dim:#8A9199;
    --text-faint:#54595E;
    --radius:16px;
    --path-accent:#4E89FF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  body{ display:flex; justify-content:center; min-height:100vh; }
  .app{ width:100%; max-width:430px; min-height:100vh; position:relative; padding-bottom:40px; }

  /* ---------- HEADER (matches Home Console / Path Selection / Achievements) ---------- */
  header{ display:grid; grid-template-columns:32px 1fr 32px; align-items:center; column-gap:6px; padding:8px 16px 0 16px; }
  .back-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--path-accent); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; flex-shrink:0; box-shadow:0 0 10px -2px color-mix(in srgb, var(--path-accent) 65%, transparent); transition:opacity 0.2s ease; }
  .back-btn:active{ opacity:0.7; }
  .back-btn svg{ width:15px; height:15px; stroke:var(--path-accent); }
  .logout-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; box-shadow:0 0 8px rgba(78,137,255,0.35); flex-shrink:0; transition:opacity 0.2s ease; }
  .logout-btn:active{ opacity:0.7; }
  .logout-btn svg{ width:15px; height:15px; stroke:var(--signal); }
  .wordmark{ text-align:center; overflow:hidden; font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:clamp(28px, 9.5vw, 38px); letter-spacing:-0.5px; color:var(--text); line-height:1; white-space:nowrap; }
  .wordmark .accent-blue{ color:var(--path-accent); }
  .wordmark-tagline{ text-align:center; margin:8px 0 0 0; font-family:'Oswald',sans-serif; font-weight:500; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--platinum); }
  .path-badge-wrap{ text-align:center; margin-bottom:14px; }
  .path-badge{ display:inline-flex; align-items:center; gap:6px; margin-top:10px; padding:5px 12px; border-radius:20px; background:var(--surface); border:1px solid var(--border); font-family:'Inter'; font-weight:600; font-size:11px; letter-spacing:0.4px; text-transform:uppercase; color:var(--text-dim); }
  .path-dot{ width:6px; height:6px; border-radius:50%; background:var(--path-accent); flex-shrink:0; }

  .eyebrow{ font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:10px; display:block; }
  .section{ padding:0 20px; margin-bottom:14px; }

  /* ---------- MISSION SUMMARY ---------- */
  .mission-name{ font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:25px; line-height:1.1; color:var(--text); margin-bottom:8px; }
  .mission-meta{ display:flex; gap:8px; flex-wrap:wrap; }
  .tag{ font-size:11px; font-weight:600; letter-spacing:0.5px; padding:6px 12px; border-radius:20px; background:var(--surface); border:1px solid var(--border); color:var(--text-dim); text-transform:uppercase; }

  /* ---------- EXERCISE LIST ---------- */
  .exercise-list{ display:flex; flex-direction:column; gap:9px; }
  .exercise-card{ background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:13px 14px; }
  .exercise-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .exercise-title-group{ display:flex; align-items:baseline; gap:8px; min-width:0; flex:1; }
  .exercise-num{ font-family:'Oswald',sans-serif; font-weight:700; font-size:13px; color:var(--text-faint); flex-shrink:0; }
  .exercise-name{ font-family:'Oswald',sans-serif; font-weight:600; text-transform:none; font-size:15.5px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .exercise-vol{ font-family:'Oswald',sans-serif; font-weight:700; font-size:13px; color:var(--path-accent); white-space:nowrap; flex-shrink:0; }
  .exercise-cue{ font-size:12px; color:var(--text-dim); line-height:1.3; margin-top:5px; padding-left:21px; }

  /* Per-set tracking — independent circular checkboxes, one per set, squeezed
     onto the title row itself to save vertical space. Purely optional: the
     Mark Complete button below never checks this state. */
  .set-trackers{ display:flex; gap:5px; flex-shrink:0; }
  .set-dot{ appearance:none; -webkit-appearance:none; width:19px; height:19px; margin:0; padding:0; flex-shrink:0; border:1.5px solid var(--border); border-radius:50%; background:var(--surface-alt); cursor:pointer; transition:all 0.2s ease; }
  .set-dot:checked{ background:var(--path-accent); border-color:var(--path-accent); box-shadow:0 0 8px color-mix(in srgb, var(--path-accent) 55%, transparent); }
  .set-dot:active{ opacity:0.8; }

  /* ---------- MARK COMPLETE ---------- */
  .complete-btn{ width:100%; padding:19px; border:none; border-radius:12px; background:var(--path-accent); color:#FFFFFF; font-family:'Inter'; font-weight:700; font-size:16px; letter-spacing:0.5px; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; box-shadow:0 8px 24px -8px color-mix(in srgb, var(--path-accent) 40%, transparent); transition:all 0.15s ease; }
  .complete-btn svg{ width:18px; height:18px; }
  .complete-btn:active{ opacity:0.85; transform:scale(0.98); }
  .complete-btn.confirmed{ background:#2fbf71; box-shadow:0 8px 24px -8px rgba(47,191,113,0.4); }

  .no-session-note{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; font-size:12.5px; color:var(--text-faint); text-align:center; }
</style>
</head>
<body>
<!-- Same defensive pattern as Home Console: deferred, nothing below assumes it loaded until checked. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<div class="app">

  <header>
    <button class="back-btn" id="backBtn" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="wordmark">ZERO<span class="accent-blue">9</span>HUNDRED</div>
    <button class="logout-btn" id="logoutBtn" type="button" aria-label="Log out"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></button>
  </header>

  <div class="wordmark-tagline">DISCIPLINE. FOCUS. STRENGTH.</div>
  <div class="path-badge-wrap">
    <div class="path-badge"><span class="path-dot"></span><span id="pathBadgeLabel">Calisthenics</span></div>
  </div>

  <div class="section">
    <span class="eyebrow">Today's Mission</span>
    <div class="mission-name" id="missionName">Upper Body Push</div>
    <div class="mission-meta">
      <span class="tag" id="tagTime">15 MIN</span>
      <span class="tag" id="tagTier">STANDARD</span>
    </div>
  </div>

  <div class="section">
    <span class="eyebrow">Today's Exercises</span>
    <div class="exercise-list" id="exerciseList"></div>
  </div>

  <div class="section">
    <button class="complete-btn" id="completeBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="completeBtnLabel">Mark Complete</span>
    </button>
  </div>

</div>

<script>
  // ============================================================
  // Z9H CROSS-SCREEN STATE — same helper as every other screen.
  // ============================================================
  const Z9H = {
    get(key, fallback){ try{ const v = sessionStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } },
    set(key, value){ try{ sessionStorage.setItem(key, JSON.stringify(value)); }catch(e){} }
  };

  // ============================================================
  // ADAPTIVE THEME LAYER — same pattern as Home Console. Must run
  // before the exercise list renders below, since exercise-vol,
  // set-dot, and complete-btn all read var(--path-accent) at paint time.
  // ============================================================
  const PATH_COLORS = {
    calisthenics: '#4E89FF',
    running:      '#FF8A00',
    strength:     '#FF3B30',
    movement:     '#CCFF00',
    breathwork:   '#00E5FF',
    mind:         '#AF52DE'
  };
  (function applyPathTheme(){
    const storedAccent = Z9H.get('z9h_path_accent', null);
    const storedPath = Z9H.get('z9h_active_path', 'calisthenics');
    const accent = storedAccent || PATH_COLORS[storedPath] || PATH_COLORS.calisthenics;
    document.documentElement.style.setProperty('--path-accent', accent);
  })();

  // ============================================================
  // Z9H DATA CLIENT — real Supabase wiring, replacing the sessionStorage
  // demo store. withTimeout wrapper on every call per Z9H standing rules.
  // ============================================================
  var SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';

  function withTimeout(promise, ms) {
    ms = ms || 10000;
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('timeout')), ms);
      promise.then(
        val => { clearTimeout(timer); resolve(val); },
        err => { clearTimeout(timer); reject(err); }
      );
    });
  }

  let supaClient = null;
  function getClient() {
    if (supaClient) return supaClient;
    if (typeof window.supabase === 'undefined') return null;
    supaClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    try {
      supaClient.auth.onAuthStateChange((event) => {
        if (event === 'TOKEN_REFRESHED') return; // per Z9H governance
      });
    } catch (e) { /* non-fatal */ }
    return supaClient;
  }

  const session = Z9H.get('z9h_session', null);
  const exerciseList = document.getElementById('exerciseList');
  const missionName = document.getElementById('missionName');
  const tagTime = document.getElementById('tagTime');
  const tagTier = document.getElementById('tagTier');
  const completeBtn = document.getElementById('completeBtn');
  const completeBtnLabel = document.getElementById('completeBtnLabel');

  function formatVolume(ex){
    if (ex.type === 'timed') {
      return `${ex.sets}\u00D7${ex.durationPerSet}s`;
    }
    return `${ex.sets}\u00D7${ex.repsPerSet}`;
  }

  if (session && session.exercises && session.exercises.length) {
    missionName.textContent = session.title;
    tagTime.textContent = `${session.time} MIN`;
    tagTier.textContent = (session.tier || 'standard').toUpperCase();
    const path = session.path || 'calisthenics';
    document.getElementById('pathBadgeLabel').textContent = path.charAt(0).toUpperCase() + path.slice(1);

    session.exercises.forEach((ex, i) => {
      const card = document.createElement('div');
      card.className = 'exercise-card';

      // One independent checkbox per set — not radios, since multiple sets
      // can be marked done at once and none of them are mutually exclusive.
      let dotsHtml = '';
      for (let s = 0; s < ex.sets; s++) {
        dotsHtml += `<input type="checkbox" class="set-dot" aria-label="${ex.name} set ${s + 1} of ${ex.sets}">`;
      }

      card.innerHTML = `
        <div class="exercise-top">
          <div class="exercise-title-group">
            <span class="exercise-num">${String(i + 1).padStart(2, '0')}</span>
            <span class="exercise-name">${ex.name}</span>
            <span class="exercise-vol">${formatVolume(ex)}</span>
          </div>
          <div class="set-trackers">${dotsHtml}</div>
        </div>
        <div class="exercise-cue">${ex.prompt || ''}</div>
      `;
      exerciseList.appendChild(card);
    });
  } else {
    // No session found — this screen was opened directly rather than via Start Mission on Home.
    console.warn('Today\'s Mission: no session found in storage — start a mission from Home Console to see real exercises.');
    missionName.textContent = 'No Mission Selected';
    tagTime.style.display = 'none';
    tagTier.style.display = 'none';
    const note = document.createElement('div');
    note.className = 'no-session-note';
    note.textContent = "Start a mission from Home Console to see today's exercises here.";
    exerciseList.appendChild(note);
    completeBtn.disabled = true;
    completeBtn.style.opacity = '0.4';
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    // Fixed app sequence: Login -> Pathways -> Home -> Mission.
    // Mission's previous step is Home.
    window.location.href = 'z9h-home-screen-v2.html';
  });

  completeBtn.addEventListener('click', () => {
    if (completeBtn.disabled) return;
    completeBtn.disabled = true;
    completeBtnLabel.textContent = 'Saving\u2026';

    const client = getClient();
    if (!client) {
      completeBtnLabel.textContent = 'Auth library not loaded — try again';
      completeBtn.disabled = false;
      return;
    }

    withTimeout(client.auth.getSession())
      .then(result => {
        if (result.error) throw result.error;
        const user = result.data && result.data.session && result.data.session.user;
        if (!user) throw new Error('Not signed in');

        const row = {
          user_id: user.id,
          mission_id: session.missionId,
          tier: session.tier || 'standard',
          time_minutes: Number(session.time) || 15,
          xp_earned: (session.rewards && session.rewards.xp) || 150
          // completed_date omitted deliberately — defaults to current_date server-side,
          // which is correct for "mark complete right now" (retro-logging past dates
          // is a separate, explicit flow on the Calendar screen).
        };

        return withTimeout(client.from('mission_completions').insert(row));
      })
      .then(result => {
        if (result.error) {
          // 23505 = unique_violation on (user_id, completed_date) — they've
          // already logged today. Not a failure from the user's point of view.
          if (result.error.code === '23505') {
            console.log('Already completed today — treating as success.');
          } else {
            throw result.error;
          }
        }
        completeBtn.classList.add('confirmed');
        completeBtnLabel.textContent = 'Mission Complete';
        setTimeout(() => {
          window.location.href = 'z9h-home-screen-v2.html';
        }, 900);
      })
      .catch(err => {
        console.warn('Mark Complete failed:', err.message);
        completeBtnLabel.textContent = 'Save failed — tap to retry';
        completeBtn.disabled = false;
      });
  });
</script>

<!-- ============================================================
     LOGOUT — same self-contained pattern used on Home Console.
     Duplicated intentionally rather than shared, since every screen
     stays a standalone file with no build step.
============================================================ -->
<script defer>
(function () {
  var SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';
  var LOGIN_URL = 'index.html';

  function attachLogout() {
    var btn = document.getElementById('logoutBtn');
    if (!btn) return;

    btn.addEventListener('click', function () {
      btn.disabled = true;

      if (typeof window.supabase === 'undefined') {
        window.location.href = LOGIN_URL;
        return;
      }

      try {
        var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        client.auth.signOut().finally(function () {
          window.location.href = LOGIN_URL;
        });
      } catch (err) {
        console.warn('Sign out failed:', err.message);
        window.location.href = LOGIN_URL;
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attachLogout);
  } else {
    attachLogout();
  }
})();
</script>
</body>
</html>
