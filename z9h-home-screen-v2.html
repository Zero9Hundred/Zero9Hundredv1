<style>
  :root{
    --bg:#050608;
    --surface:#0D0F14;
    --surface-alt:#12151B;
    --border:#202530;
    --platinum:#C6CED4;
    --signal:#4E89FF;
    --text:#F1F3F7;
    --text-dim:#8A9199;
    --text-faint:#54595E;
    --radius:16px;
    --path-accent:#4E89FF; /* Adaptive Theme Layer v1 token — mocked here equal to signal blue since Calisthenics is the only live path */
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  body{ display:flex; justify-content:center; min-height:100vh; }
  .app{ width:100%; max-width:430px; min-height:100vh; position:relative; padding-bottom:96px; }

  /* ---------- HEADER ---------- */
  header{ display:grid; grid-template-columns:32px 1fr 32px; align-items:center; column-gap:6px; padding:8px 14px 0 14px; }
  header .wordmark{ text-align:center; }
  .logout-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; box-shadow:0 0 8px rgba(78,137,255,0.35); transition:opacity 0.2s ease; }
  .logout-btn:active{ opacity:0.7; }
  .logout-btn svg{ width:15px; height:15px; stroke:var(--signal); }
  .back-btn{ width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--path-accent); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; box-shadow:0 0 10px -2px color-mix(in srgb, var(--path-accent) 65%, transparent); transition:opacity 0.2s ease; }
  .back-btn:active{ opacity:0.7; }
  .back-btn svg{ width:15px; height:15px; stroke:var(--path-accent); }
  header .wordmark{ text-align:center; overflow:hidden; }

  /* ---------- WORDMARK ---------- */
  .wordmark-block{ text-align:center; padding:6px 16px 8px 16px; }
  .wordmark{ font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:clamp(28px, 9.5vw, 38px); letter-spacing:-0.5px; color:var(--text); line-height:1; white-space:nowrap; }
  .wordmark .accent-blue{ color:var(--path-accent); }
  .wordmark-tagline{ margin-top:8px; font-family:'Oswald',sans-serif; font-weight:500; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--platinum); white-space:nowrap; }
  .path-badge{ display:inline-flex; align-items:center; gap:6px; margin-top:8px; padding:5px 12px; border-radius:20px; background:var(--surface); border:1px solid var(--border); font-family:'Inter'; font-weight:600; font-size:11px; letter-spacing:0.4px; text-transform:uppercase; color:var(--text-dim); cursor:pointer; -webkit-appearance:none; appearance:none; }
  .path-badge:active{ opacity:0.7; }
  .path-dot{ width:6px; height:6px; border-radius:50%; background:var(--path-accent); flex-shrink:0; }
  .path-chevron{ width:10px; height:10px; stroke:var(--text-faint); fill:none; margin-left:1px; }

  /* ---------- SECTION LABEL ---------- */
  .eyebrow{ font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:10px; display:block; }
  .section{ padding:0 20px; margin-bottom:14px; }

  /* ---------- TIME ALLOCATION ---------- */
  .pill-row{ display:flex; gap:6px; }
  .pill{
    position:relative; flex:1; display:flex; align-items:center; justify-content:center; gap:4px;
    background:transparent; border:1px solid var(--border); color:var(--text-dim);
    border-radius:20px; padding:8px 2px; cursor:pointer; transition:all 0.15s ease;
    font-family:'Inter'; font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:0.2px;
  }
  .pill svg{ width:11px; height:11px; stroke:var(--text-dim); fill:none; flex-shrink:0; transition:stroke 0.15s ease; }
  .pill:active{ opacity:0.7; }
  .pill.active{
    border-color:var(--path-accent);
    color:var(--path-accent);
    background:radial-gradient(circle, color-mix(in srgb, var(--path-accent) 14%, transparent), transparent 70%);
    box-shadow:0 0 14px -3px var(--path-accent);
  }
  .pill.active svg{ stroke:var(--path-accent); }

  /* ---------- HERO MISSION CARD ---------- */
  .hero-card{ position:relative; background:radial-gradient(circle at 85% -10%, rgba(78,137,255,0.08), transparent 55%), var(--surface); border:1px solid var(--border); border-radius:22px; padding:20px 22px 18px 22px; overflow:hidden; transition:all 0.2s ease; }
  .hero-card .corner{ position:absolute; width:18px; height:18px; pointer-events:none; }
  .hero-card .corner.tl{ top:12px; left:12px; border-top:2px solid var(--border); border-left:2px solid var(--border); }
  .hero-card .corner.tr{ top:12px; right:12px; border-top:2px solid var(--border); border-right:2px solid var(--border); }
  .hero-card .corner.bl{ bottom:12px; left:12px; border-bottom:2px solid var(--border); border-left:2px solid var(--border); }
  .hero-card .corner.br{ bottom:12px; right:12px; border-bottom:2px solid var(--border); border-right:2px solid var(--border); }

  .hero-texture{ position:absolute; top:-40px; right:-40px; width:220px; height:220px; opacity:0.04; pointer-events:none; }
  .hero-texture svg{ width:100%; height:100%; stroke:var(--signal); fill:none; }
  .hero-monogram{ position:absolute; bottom:-14px; right:6px; font-family:'Oswald',sans-serif; font-weight:700; font-size:96px; letter-spacing:2px; color:var(--platinum); opacity:0.03; pointer-events:none; line-height:1; }

  .hero-inner{ position:relative; z-index:1; }
  .mission-title{ font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:25px; line-height:1.1; margin:2px 0 12px 0; color:var(--text); letter-spacing:-0.3px; }

  .mission-brief{ border-left:2px solid var(--platinum); padding-left:14px; margin-bottom:16px; }
  .brief-label{ display:block; font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--text-faint); font-weight:600; margin-bottom:4px; }
  .brief-text{ margin:0; font-size:14px; line-height:1.45; color:var(--text-dim); font-style:italic; }

  .exercise-list{ list-style:none; margin:0 0 18px 14px; padding:0; display:flex; flex-direction:column; gap:6px; }
  .exercise-list li{ font-size:12.5px; color:var(--platinum); display:flex; align-items:center; gap:8px; }
  .exercise-list li::before{ content:''; width:4px; height:4px; border-radius:50%; background:var(--path-accent); flex-shrink:0; }
  .exercise-list.pending li{ color:var(--text-faint); font-style:italic; }
  .exercise-list.pending li::before{ background:var(--text-faint); }

  .mission-tags{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .tag{ font-size:11px; font-weight:600; letter-spacing:0.5px; padding:7px 13px; border-radius:20px; background:var(--surface-alt); border:1px solid var(--border); color:var(--text-dim); text-transform:uppercase; display:flex; align-items:center; gap:5px; }
  .tag svg{ width:12px; height:12px; stroke:var(--text-dim); fill:none; }
  .tag.tag-glow{
    border-color:var(--path-accent);
    color:var(--path-accent);
    background:radial-gradient(circle, color-mix(in srgb, var(--path-accent) 14%, transparent), transparent 70%);
    box-shadow:0 0 14px -3px var(--path-accent);
  }
  .tag.tag-glow svg{ stroke:var(--path-accent); }

  /* ---------- INTENSITY TIER (NEW) ---------- */
  .intensity-block{ margin-bottom:14px; }
  .intensity-label{ display:block; font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--text-faint); font-weight:700; margin-bottom:8px; }
  .intensity-row{ display:flex; gap:8px; }
  .intensity-pill{ flex:1; text-align:center; padding:9px 4px; border-radius:10px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-family:'Inter'; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.3px; cursor:pointer; transition:all 0.15s ease; }
  .intensity-pill:active{ opacity:0.7; }
  .intensity-pill.active{
    border-color:var(--path-accent);
    color:var(--path-accent);
    background:radial-gradient(circle, color-mix(in srgb, var(--path-accent) 14%, transparent), transparent 70%);
    box-shadow:0 0 14px -3px var(--path-accent);
  }

  .start-btn{ width:100%; padding:19px; border:none; border-radius:12px; background:var(--path-accent); color:#FFFFFF; font-family:'Inter'; font-weight:700; font-size:16px; letter-spacing:0.5px; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; box-shadow:0 8px 24px -8px color-mix(in srgb, var(--path-accent) 40%, transparent); transition:all 0.15s ease; }
  .start-btn svg{ width:17px; height:17px; }
  .start-btn:active{ opacity:0.85; transform:scale(0.98); }
  .start-btn.confirmed{ background:#2fbf71; box-shadow:0 8px 24px -8px rgba(47,191,113,0.4); }

  /* ---------- BOTTOM NAV ---------- */
  nav{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(5,6,8,0.92); backdrop-filter:blur(14px); border-top:1px solid var(--border); display:flex; justify-content:space-around; align-items:center; padding:10px 4px calc(10px + env(safe-area-inset-bottom)) 4px; z-index:10; }
  .nav-item{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--text-faint); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; text-decoration:none; min-width:56px; min-height:52px; padding:4px 2px; border-radius:12px; position:relative; }
  .nav-dot-alert{ position:absolute; top:2px; right:10px; width:6px; height:6px; border-radius:50%; background:var(--signal); }
  .nav-item svg{ width:23px; height:23px; stroke:var(--text-faint); fill:none; }
  .nav-item.active{ color:var(--platinum); }
  .nav-item.active svg{ stroke:var(--platinum); }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<!-- ============================================================
     SESSION GATE — checked before the app is shown. Covers the
     whole screen until we've confirmed a real Supabase session
     exists; redirects to index.html if not. Prevents the app from
     ever flashing visible before an auth check completes.
============================================================ -->
<div id="sessionGate" style="position:fixed; inset:0; background:#050608; z-index:999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;">
  <div style="font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:2px; color:#C6CED4; font-size:14px; text-transform:uppercase;">VERIFYING ACCESS</div>
  <div id="sessionGateMsg" style="font-size:12px; color:#8A9199;">Checking your session&hellip;</div>
</div>

<script defer>
(function () {
  var SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';
  var LOGIN_URL = 'index.html';

  function withTimeout(promise, ms) {
    ms = ms || 10000;
    return new Promise(function (resolve, reject) {
      var timer = setTimeout(function () { reject(new Error('timeout')); }, ms);
      promise.then(
        function (val) { clearTimeout(timer); resolve(val); },
        function (err) { clearTimeout(timer); reject(err); }
      );
    });
  }

  function gateMsg(msg) {
    var el = document.getElementById('sessionGateMsg');
    if (el) el.textContent = msg;
  }

  function revealApp() {
    var gate = document.getElementById('sessionGate');
    if (gate) gate.remove();
  }

  function sendToLogin() {
    window.location.href = LOGIN_URL;
  }

  function proceedWithClient() {
    var client;
    try {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (err) {
      gateMsg('Auth client failed to start. Redirecting to sign in\u2026');
      setTimeout(sendToLogin, 1200);
      return;
    }

    withTimeout(client.auth.getSession())
      .then(function (result) {
        if (result.error) throw result.error;
        if (result.data && result.data.session) {
          revealApp();
        } else {
          sendToLogin();
        }
      })
      .catch(function (err) {
        console.warn('Session check failed:', err.message);
        sendToLogin();
      });

    // Per Z9H governance: TOKEN_REFRESHED is routine and should never
    // trigger a re-check or UI reaction.
    try {
      client.auth.onAuthStateChange(function (event) {
        if (event === 'TOKEN_REFRESHED') return;
        if (event === 'SIGNED_OUT') sendToLogin();
      });
    } catch (err) {
      console.warn('Auth state listener failed to attach:', err);
    }
  }

  function checkSession() {
    if (typeof window.supabase !== 'undefined') {
      proceedWithClient();
      return;
    }

    // The CDN script can still be finishing on a slower connection even
    // though it's deferred — same real-world issue the login page hit.
    // Retry every 500ms for up to 5 seconds before actually failing safe.
    gateMsg('Checking your session\u2026');
    var retries = 0;
    var retryInterval = setInterval(function () {
      retries++;
      if (typeof window.supabase !== 'undefined') {
        clearInterval(retryInterval);
        proceedWithClient();
      } else if (retries >= 10) {
        clearInterval(retryInterval);
        gateMsg('Could not load the auth library. Redirecting to sign in\u2026');
        setTimeout(sendToLogin, 1200);
      }
    }, 500);
  }

  checkSession();
})();
</script>

<!-- ============================================================
     LOGOUT — separate small script, kept independent of the session
     gate above. Creates its own lightweight client rather than sharing
     scope, matching the modular one-job-per-script pattern already
     used across the app.
============================================================ -->
<script defer>
(function () {
  var SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';
  var LOGIN_URL = 'index.html';

  function attachLogout() {
    var btn = document.getElementById('logoutBtn');
    if (!btn) return;

    btn.addEventListener('click', function () {
      btn.disabled = true;

      if (typeof window.supabase === 'undefined') {
        // Can't confirm server-side logout, but there's no local session
        // worth protecting either way — send them to login regardless.
        window.location.href = LOGIN_URL;
        return;
      }

      try {
        var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        client.auth.signOut().finally(function () {
          window.location.href = LOGIN_URL;
        });
      } catch (err) {
        console.warn('Sign out failed:', err.message);
        window.location.href = LOGIN_URL;
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attachLogout);
  } else {
    attachLogout();
  }
})();
</script>

<script>
  // Mocked profile default — real source will be profile.intensityDefault once onboarding exists
  // ============================================================
  // Z9H CROSS-SCREEN STATE — shared handoff mechanism between pages.
  // Since every screen is a standalone static HTML file (no build step,
  // no server routing), state passes between them via sessionStorage.
  // This identical helper is duplicated in every screen file on purpose —
  // keeping each file self-contained matters more than avoiding repetition,
  // given how these get deployed (Safari file upload to Netlify).
  // ============================================================
  const Z9H = {
    get(key, fallback){ try{ const v = sessionStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } },
    set(key, value){ try{ sessionStorage.setItem(key, JSON.stringify(value)); }catch(e){} }
  };

  // ============================================================
  // ADAPTIVE THEME LAYER — applies the accent colour chosen on the
  // Pathways screen. z9h_path_accent (written by the Proceed button
  // there) is the source of truth; PATH_COLORS is a fallback map so
  // this still works even from an older session that only stored
  // z9h_active_path. Must run before anything below renders, since
  // pills, tags, exercise dots and the intensity row all read
  // var(--path-accent) at paint time. Duplicated map intentionally —
  // same reasoning as the Z9H helper above, each screen stays
  // self-contained.
  // ============================================================
  const PATH_COLORS = {
    calisthenics: '#4E89FF',
    running:      '#FF8A00',
    strength:     '#FF3B30',
    movement:     '#CCFF00',
    breathwork:   '#00E5FF',
    mind:         '#AF52DE'
  };
  (function applyPathTheme(){
    const storedAccent = Z9H.get('z9h_path_accent', null);
    const storedPath = Z9H.get('z9h_active_path', 'calisthenics');
    const accent = storedAccent || PATH_COLORS[storedPath] || PATH_COLORS.calisthenics;
    document.documentElement.style.setProperty('--path-accent', accent);
  })();

  const PROFILE_DEFAULT_TIER = 'standard';
  let selectedTier = PROFILE_DEFAULT_TIER;

  const intensityPills = document.querySelectorAll('.intensity-pill');
  intensityPills.forEach(p => {

  // Derives 30/45-min versions from the authored 15-min baseline exercise.
  // Sets step up +1 per duration tier (15->30->45) rather than doubling —
  // rest periods and fatigue already stretch real time non-linearly.
  // Reps get +2 per step, timed holds get +5s per step. Advanced tier also
  // trims rest by 5s per step (floor 15s) to increase density, not just volume.
  function scaleExercise(base, tier, timeMinutes) {
    const steps = { 15: 0, 30: 1, 45: 2 }[timeMinutes] || 0;
    if (steps === 0) return base;

    const scaled = { ...base, sets: base.sets + steps };
    if (base.type === 'reps') {
      scaled.repsPerSet = base.repsPerSet + (steps * 2);
    } else {
      scaled.durationPerSet = base.durationPerSet + (steps * 5);
    }
    if (tier === 'advanced') {
      scaled.intraSetRest = Math.max(15, base.intraSetRest - (steps * 5));
      if (base.interExerciseRest > 0) {
        scaled.interExerciseRest = Math.max(15, base.interExerciseRest - (steps * 5));
      }
    }
    return scaled;
  }

  // 5 and 10 min are about scope (fewer exercises), not lighter versions of the
  // same exercises — they slice from the 15-min baseline list, unscaled.
  const shortSessionExerciseCount = { 5: 1, 10: 2 };

  function resolveMission(mission, tier, timeMinutes) {
    if (!mission.hasContent) {
      return { title: mission.title, brief: 'Content pending — no exercise data authored for this mission yet.', exerciseNames: [], resolvedExercises: [] };
    }
    const dataset = exerciseDatasets[mission.missionId];
    const baseline = dataset.exercises;

    let exercisesForDuration;
    if (timeMinutes === 15 || timeMinutes === 30 || timeMinutes === 45) {
      exercisesForDuration = baseline.map(ex => scaleExercise(ex.variants[tier], tier, timeMinutes));
    } else {
      // 5/10 min: slice first N exercises from the baseline, unscaled
      const count = shortSessionExerciseCount[timeMinutes] || baseline.length;
      exercisesForDuration = baseline.slice(0, count).map(ex => ex.variants[tier]);
    }

    const exerciseNames = exercisesForDuration.map(ex => ex.name);
    return { title: mission.title, brief: dataset.brief, exerciseNames, resolvedExercises: exercisesForDuration, rewards: dataset.rewards };
  }

  function render() {
    // Honest placeholder: switching to any path other than Calisthenics has nowhere
    // real to go yet, since no other path's exercise data has been authored.
    if (!pathHasContent) {

      startBtn.style.opacity = '0.4';

    const result = resolveMission(todaysMission, selectedTier, Number(selectedTime));
    currentResolvedMission = result;

    card.style.opacity = '0.4';
    setTimeout(() => {
      briefText.textContent = `"${result.brief}"`;

      exerciseList.innerHTML = '';
      if (result.exerciseNames.length) {
        exerciseList.classList.remove('pending');

      } else {
        exerciseList.classList.add('pending');
        const li = document.createElement('li');

        exerciseList.appendChild(li);
      }

      card.style.opacity = '1';
    }, 100);
  }

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedTime = chip.getAttribute('data-time');
      render();

      // Reset any prior confirmation state when the selection changes
      startBtn.classList.remove('confirmed');
      startBtnLabel.textContent = 'Start Mission';
    });
  });

  // Start Mission reads the currently selected time, tier and today's fixed mission,
  // writes the resolved contract to shared state, then hands off to Mission Engage.
  startBtn.addEventListener('click', () => {
    const hasExercises = (currentResolvedMission?.resolvedExercises || []).length > 0;

    if (!hasExercises) {
      // Guard: don't navigate into a broken Mission Engage screen with nothing to run.
      startBtnLabel.textContent = 'No Content Yet — Try Calisthenics';
      setTimeout(() => { startBtnLabel.textContent = 'Start Mission'; }, 1800);
      return;
    }

    startBtn.classList.add('confirmed');
    startBtnLabel.textContent = `Mission Locked — ${selectedTime} MIN`;

    const sessionPayload = {
      day: todayKey,
      path: Z9H.get('z9h_active_path', 'calisthenics'),
      missionId: todaysMission.missionId,
      title: todaysMission.title,
      time: selectedTime,
      tier: selectedTier,
      // Full contract (sets/rest/prompt per exercise) — this is what Mission Engage
      // and the Live Workout Console actually need, not just display labels.
      exercises: currentResolvedMission.resolvedExercises,
      rewards: currentResolvedMission.rewards,
      startedAt: Date.now()
    };
    Z9H.set('z9h_session', sessionPayload);
    console.log('Start Mission — handing off to Mission Engage', sessionPayload);

    setTimeout(() => {
      window.location.href = 'z9h-today-mission.html';
    }, 550); // brief pause so the green confirmation is actually visible before navigating
  });

  render();
</script>
</body>
</html>
