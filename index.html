<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z9H — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:#050608;
    --surface:#0D0F14;
    --surface-alt:#12151B;
    --border:#202530;
    --platinum:#C6CED4;
    --signal:#4E89FF;
    --text:#F1F3F7;
    --text-dim:#8A9199;
    --text-faint:#54595E;
    --radius:16px;
    --path-accent:#4E89FF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  body{ display:flex; justify-content:center; min-height:100vh; }
  .app{ width:100%; max-width:430px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:24px 20px calc(24px + env(safe-area-inset-bottom)); }

  .wordmark-block{ text-align:center; margin-bottom:36px; }
  .wordmark{ font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:clamp(28px, 9.5vw, 38px); letter-spacing:-0.5px; color:var(--text); line-height:1; white-space:nowrap; }
  .wordmark .accent-blue{ color:var(--signal); }
  .wordmark-tagline{ margin-top:8px; font-family:'Oswald',sans-serif; font-weight:500; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--platinum); }

  .mode-toggle{ display:flex; justify-content:center; gap:6px; margin-bottom:24px; }
  .mode-btn{ background:none; border:none; font-family:'Inter'; font-size:12px; font-weight:600; letter-spacing:0.4px; text-transform:uppercase; color:var(--text-faint); cursor:pointer; padding:4px 8px; }
  .mode-btn.active{ color:var(--platinum); border-bottom:2px solid var(--path-accent); }
  .mode-sep{ color:var(--text-faint); font-size:12px; }

  .form-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:8px; }
  .field input{ width:100%; padding:14px; border-radius:10px; background:var(--surface-alt); border:1px solid var(--border); color:var(--text); font-family:'Inter'; font-size:15px; }
  .field input:focus{ outline:none; border-color:var(--path-accent); }
  .field input::placeholder{ color:var(--text-faint); }

  .submit-btn{ width:100%; padding:17px; border:none; border-radius:12px; background:var(--path-accent); color:#FFFFFF; font-family:'Inter'; font-weight:700; font-size:15px; letter-spacing:0.5px; text-transform:uppercase; cursor:pointer; margin-top:6px; transition:all 0.15s ease; box-shadow:0 8px 24px -8px rgba(78,137,255,0.4); }
  .submit-btn:active{ opacity:0.85; transform:scale(0.98); }
  .submit-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .status-msg{ text-align:center; font-size:12.5px; margin-top:16px; min-height:16px; color:var(--text-dim); }
  .status-msg.error{ color:#e2604f; }
  .status-msg.success{ color:#2fbf71; }

  .fine-print{ text-align:center; font-size:11px; color:var(--text-faint); margin-top:24px; line-height:1.5; }
</style>
</head>
<body>
<div id="diagCheck" style="text-align:center; font-size:11px; color:#e2604f; padding:6px; font-family:monospace;">⚠ JS not running yet…</div>
<script>document.getElementById('diagCheck').textContent = '✓ JS is running — page loaded OK';</script>

<div class="app">

  <div class="wordmark-block">
    <div class="wordmark">ZERO<span class="accent-blue">9</span>HUNDRED</div>
    <div class="wordmark-tagline">DISCIPLINE. FOCUS. STRENGTH.</div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="signInTab" type="button">Sign In</button>
    <span class="mode-sep">/</span>
    <button class="mode-btn" id="signUpTab" type="button">Create Account</button>
  </div>

  <div class="form-card">
    <form id="authForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="submit-btn" id="submitBtn" type="submit">Sign In</button>
    </form>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="fine-print" id="finePrint">
    Real Supabase auth — needs your project URL and anon key filled in below before this will connect to anything.
  </div>

</div>

<script>
  // ============================================================
  // SUPABASE CONFIG — REPLACE THESE TWO VALUES.
  // Find them in your Supabase dashboard: Project Settings > API.
  // The anon/public key is safe to expose client-side — it's not a secret,
  // access control is enforced by your Row Level Security policies, not by
  // hiding this key.
  // ============================================================
  const SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';

  const CONFIG_MISSING = SUPABASE_URL.startsWith('YOUR_') || SUPABASE_ANON_KEY.startsWith('YOUR_');

  // Surface any uncaught error visibly rather than letting it silently vanish
  // into the console — this is what would have shown the real cause of the
  // "Script error" instead of a generic browser message.
  window.addEventListener('error', (event) => {
    const msg = document.getElementById('statusMsg');
    if (msg) {
      msg.textContent = 'Unexpected error: ' + (event.message || 'unknown — check browser console for details');
      msg.classList.add('error');
    }
    console.error('Uncaught error:', event.error || event.message, event.filename, event.lineno);
  });
  window.addEventListener('unhandledrejection', (event) => {
    const msg = document.getElementById('statusMsg');
    if (msg) {
      msg.textContent = 'Unexpected error: ' + (event.reason?.message || String(event.reason));
      msg.classList.add('error');
    }
    console.error('Unhandled promise rejection:', event.reason);
  });

  let supabase = null;
  let LIBRARY_FAILED_TO_LOAD = false;
  if (!CONFIG_MISSING) {
    if (typeof window.supabase === 'undefined') {
      // The CDN script didn't load at all — common if this file is opened
      // directly from local storage (file://) rather than a real hosted page,
      // since some browsers restrict cross-origin script loading under file://.
      LIBRARY_FAILED_TO_LOAD = true;
    } else {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  }

  // ============================================================
  // Z9H CROSS-SCREEN STATE — same helper as every other screen.
  // ============================================================
  const Z9H = {
    get(key, fallback){ try{ const v = sessionStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } },
    set(key, value){ try{ sessionStorage.setItem(key, JSON.stringify(value)); }catch(e){} }
  };

  // Wraps any DB/auth call with a timeout, per the project's standing rule —
  // prevents a hung network request from leaving the UI stuck forever.
  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out')), ms))
    ]);
  }

  const signInTab = document.getElementById('signInTab');
  const signUpTab = document.getElementById('signUpTab');
  const authForm = document.getElementById('authForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const finePrint = document.getElementById('finePrint');

  let mode = 'signin'; // 'signin' | 'signup'

  if (CONFIG_MISSING) {
    statusMsg.textContent = 'Supabase not configured yet — fill in SUPABASE_URL and SUPABASE_ANON_KEY at the top of this file.';
    statusMsg.classList.add('error');
    submitBtn.disabled = true;
  } else if (LIBRARY_FAILED_TO_LOAD) {
    statusMsg.textContent = 'Supabase library failed to load. If you opened this file directly (not via a real web address), try hosting it properly — some browsers block CDN scripts for local files.';
    statusMsg.classList.add('error');
    submitBtn.disabled = true;
  } else {
    finePrint.textContent = 'Signing in connects to your real Supabase project.';
  }

  function setMode(newMode) {
    mode = newMode;
    const isSignIn = mode === 'signin';
    signInTab.classList.toggle('active', isSignIn);
    signUpTab.classList.toggle('active', !isSignIn);
    submitBtn.textContent = isSignIn ? 'Sign In' : 'Create Account';
    passwordInput.autocomplete = isSignIn ? 'current-password' : 'new-password';
    statusMsg.textContent = '';
    statusMsg.className = 'status-msg';
  }

  signInTab.addEventListener('click', () => setMode('signin'));
  signUpTab.addEventListener('click', () => setMode('signup'));

  // ---- Fast path for returning users: check for an existing session before
  // making them log in again. getSession() reads local storage first — it's
  // cheap and doesn't hit the network the way getUser() does.
  async function checkExistingSession() {
    if (!supabase) return;
    try {
      const { data, error } = await withTimeout(supabase.auth.getSession(), 10000);
      if (error) { console.warn('getSession error:', error.message); return; }
      if (data?.session) {
        console.log('Existing session found — redirecting to Home Console', data.session.user?.email);
        window.location.href = 'z9h-home-screen-v2.html';
      }
    } catch (e) {
      console.warn('checkExistingSession failed:', e.message);
    }
  }
  checkExistingSession();

  // ---- Listen for future auth state changes. TOKEN_REFRESHED is suppressed
  // per the project's standing rule — it fires constantly and isn't a real
  // sign-in/sign-out event, so acting on it causes unwanted re-renders/redirects.
  if (supabase) {
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'TOKEN_REFRESHED') return;
      console.log('Auth state changed:', event);
    });
  }

  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!supabase) return;

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    submitBtn.disabled = true;
    submitBtn.textContent = mode === 'signin' ? 'Signing In…' : 'Creating Account…';
    statusMsg.textContent = '';
    statusMsg.className = 'status-msg';

    try {
      const authCall = mode === 'signin'
        ? supabase.auth.signInWithPassword({ email, password })
        : supabase.auth.signUp({ email, password });

      const { data, error } = await withTimeout(authCall, 10000);

      if (error) {
        statusMsg.textContent = error.message;
        statusMsg.classList.add('error');
        submitBtn.disabled = false;
        submitBtn.textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
        return;
      }

      if (mode === 'signup' && !data.session) {
        // Email confirmation required — Supabase's default flow.
        statusMsg.textContent = 'Account created — check your email to confirm before signing in.';
        statusMsg.classList.add('success');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
        return;
      }

      // ------------------------------------------------------------
      // IMPORTANT GAP: this confirms auth worked and gets a real user ID
      // (data.user.id / data.session.user.id). It does NOT yet read or write
      // any streak/mission-progress data — no table/schema for that exists
      // in this codebase. The demo streak counter elsewhere in the app is
      // still just a sessionStorage number, completely disconnected from
      // this login. Wiring real per-user streak persistence is a separate
      // task: it needs either the original app's existing streak schema
      // reconnected, or new tables designed for this session's mission model.
      // ------------------------------------------------------------
      console.log('Signed in successfully', { userId: data.user?.id, email: data.user?.email });

      statusMsg.textContent = 'Success — redirecting…';
      statusMsg.classList.add('success');

      setTimeout(() => {
        window.location.href = 'z9h-home-screen-v2.html';
      }, 600);

    } catch (err) {
      statusMsg.textContent = err.message === 'Request timed out'
        ? 'Request timed out — check your connection and try again.'
        : 'Something went wrong. Please try again.';
      statusMsg.classList.add('error');
      submitBtn.disabled = false;
      submitBtn.textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
    }
  });
</script>
</body>
</html>
