<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="z9h-version" content="2.0.0-auth">
<title>ZERO9HUNDRED — Access</title>

<!-- Fonts: Oswald (headline) + Inter (body), per Z9H visual system -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#050608;
    --surface:#0D0F14;
    --border:#202530;
    --platinum:#C6CED4;
    --signal:#4E89FF;
    --text:#F1F3F7;
    --path-accent:#4E89FF;
    --danger:#FF5C5C;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow-x:hidden;
  }

  /* Radar texture — faint concentric rings, instrument-panel language */
  body::before{
    content:"";
    position:fixed;
    top:50%; left:50%;
    width:1400px; height:1400px;
    transform:translate(-50%,-50%);
    background:
      repeating-radial-gradient(circle at center,
        rgba(78,137,255,0.05) 0px,
        rgba(78,137,255,0.05) 1px,
        transparent 1px,
        transparent 90px);
    pointer-events:none;
    z-index:0;
  }

  /* Z9H monogram watermark */
  body::after{
    content:"Z9H";
    position:fixed;
    bottom:-4vw;
    right:-2vw;
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:32vw;
    line-height:1;
    color:rgba(198,206,212,0.025);
    letter-spacing:-0.02em;
    pointer-events:none;
    z-index:0;
    user-select:none;
  }

  .panel{
    position:relative;
    z-index:1;
    width:100%;
    max-width:400px;
    background:var(--surface);
    border:1px solid var(--border);
    padding:36px 28px 28px;
  }

  /* Corner brackets */
  .panel::before,
  .panel::after,
  .brackets span::before,
  .brackets span::after{
    content:"";
    position:absolute;
    width:16px; height:16px;
    border:2px solid var(--path-accent);
    opacity:0.8;
    pointer-events:none;
  }
  .panel::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .panel::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .brackets span::before{ top:-1px; right:-1px; border-left:none; border-bottom:none; }
  .brackets span::after{ bottom:-1px; left:-1px; border-right:none; border-top:none; }
  .brackets{ position:absolute; inset:0; pointer-events:none; }

  .wordmark{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:clamp(24px, 8vw, 30px);
    letter-spacing:0.02em;
    text-align:center;
    text-transform:uppercase;
  }
  .wordmark .nine{ color:var(--path-accent); }

  .tagline{
    text-align:center;
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--platinum);
    text-transform:uppercase;
    margin-top:6px;
    opacity:0.7;
  }

  .theme-engine-trigger{ position:absolute; opacity:0; width:0; height:0; pointer-events:none; }

  .tabs{
    display:flex;
    margin-top:28px;
    border:1px solid var(--border);
  }
  .tab{
    flex:1;
    text-align:center;
    padding:11px 0;
    font-family:'Oswald',sans-serif;
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--platinum);
    background:transparent;
    border:none;
    cursor:pointer;
    display:block;
  }

  #tab-signin:checked ~ .panel label[for="tab-signin"],
  #tab-signup:checked ~ .panel label[for="tab-signup"]{
    color:var(--bg);
    background:var(--path-accent);
  }

  form{ margin-top:24px; display:none; }
  #tab-signin:checked ~ .panel #form-signin{ display:block; }
  #tab-signup:checked ~ .panel #form-signup{ display:block; }

  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--platinum);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--bg);
    border:1px solid var(--border);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:12px 12px;
    outline:none;
  }
  .field input:focus{ border-color:var(--path-accent); }

  .submit-btn{
    width:100%;
    margin-top:8px;
    padding:14px 0;
    background:var(--path-accent);
    color:var(--bg);
    border:none;
    font-family:'Oswald',sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
  }
  .submit-btn:disabled{ opacity:0.5; cursor:default; }

  .status{
    margin-top:14px;
    font-size:13px;
    text-align:center;
    line-height:1.5;
    min-height:18px;
  }
  .status.error{ color:var(--danger); }
  .status.info{ color:var(--platinum); }
  .status.success{ color:var(--path-accent); }

  .footnote{
    margin-top:20px;
    text-align:center;
    font-size:10px;
    letter-spacing:0.08em;
    color:var(--platinum);
    opacity:0.4;
    text-transform:uppercase;
  }
</style>
</head>
<body>

<input type="radio" name="auth-tab" id="tab-signin" class="theme-engine-trigger" checked>
<input type="radio" name="auth-tab" id="tab-signup" class="theme-engine-trigger">

<div class="panel">
  <div class="brackets"><span></span></div>

  <div class="wordmark">ZERO<span class="nine">9</span>HUNDRED</div>
  <div class="tagline">Discipline &bull; Focus &bull; Strength</div>

  <div class="tabs">
    <label class="tab" for="tab-signin">Sign In</label>
    <label class="tab" for="tab-signup">Create Account</label>
  </div>

  <!-- SIGN IN -->
  <form id="form-signin">
    <div class="field">
      <label for="signin-email">Email</label>
      <input id="signin-email" type="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="signin-password">Password</label>
      <input id="signin-password" type="password" autocomplete="current-password" required>
    </div>
    <button class="submit-btn" id="signin-btn" type="submit">Enter Mission Control</button>
  </form>

  <!-- CREATE ACCOUNT -->
  <form id="form-signup">
    <div class="field">
      <label for="signup-name">Display Name</label>
      <input id="signup-name" type="text" autocomplete="nickname" required>
    </div>
    <div class="field">
      <label for="signup-email">Email</label>
      <input id="signup-email" type="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="signup-password">Password</label>
      <input id="signup-password" type="password" autocomplete="new-password" minlength="6" required>
    </div>
    <div class="field">
      <label for="signup-confirm">Confirm Password</label>
      <input id="signup-confirm" type="password" autocomplete="new-password" minlength="6" required>
    </div>
    <button class="submit-btn" id="signup-btn" type="submit">Deploy Account</button>
  </form>

  <div class="status" id="status"></div>
  <div class="footnote">Z9H Access Terminal</div>
</div>

<!-- ============================================================
     SUPABASE CLIENT
     Loaded first, deferred, with no code below assuming it succeeded
     until we've explicitly checked. This is the exact failure mode
     that broke the Cloudflare deploy: the CDN tag silently blocked
     the main script block. Everything here is defensive by design.
============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<script defer>
(function () {
  var Z9H_VERSION = '2.0.0-auth';

  // ----------------------------------------------------------
  // CONFIG — fill these in from Supabase Dashboard > Settings > API
  // Project: kfftrdsrzqjjvfdsrgzf (Z9H v2, isolated project)
  // Use the anon/public key only. Never the service_role key.
  // ----------------------------------------------------------
  var SUPABASE_URL = 'https://kfftrdsrzqjjvfdsrgzf.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nq44HeB6FcTZEWr9CpxvCg_XTWnu48x';

  // Where a successful sign-in / sign-up sends the user.
  var REDIRECT_URL = 'z9h-path-selection.html';

  var statusEl, formSignin, formSignup, signinBtn, signupBtn;

  function setStatus(msg, type) {
    if (!statusEl) return;
    statusEl.textContent = msg || '';
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  // Every DB/auth call gets wrapped — a hung network request should
  // never leave the UI stuck on "Signing in..." forever.
  function withTimeout(promise, ms) {
    ms = ms || 10000;
    return new Promise(function (resolve, reject) {
      var timer = setTimeout(function () {
        reject(new Error('Request timed out. Check your connection and try again.'));
      }, ms);
      promise.then(
        function (val) { clearTimeout(timer); resolve(val); },
        function (err) { clearTimeout(timer); reject(err); }
      );
    });
  }

  function setLoading(btn, isLoading, idleLabel, loadingLabel) {
    btn.disabled = isLoading;
    btn.textContent = isLoading ? loadingLabel : idleLabel;
  }

  function init() {
    statusEl = document.getElementById('status');

    // Tab switching is now pure CSS (radio + label checkbox-hack pattern,
    // matching the Pathways screen). It needs zero JavaScript to work,
    // so it can never be broken by a script or network failure again.
    formSignin = document.getElementById('form-signin');
    formSignup = document.getElementById('form-signup');
    signinBtn = document.getElementById('signin-btn');
    signupBtn = document.getElementById('signup-btn');

    // ---- Now attempt to bring up the auth client. If this fails,
    // the tabs above still work — only actual sign-in/sign-up is disabled. ----
    if (typeof window.supabase === 'undefined') {
      setStatus('Could not load the auth library. Refresh the page — if this keeps happening, the Supabase CDN script may be blocked.', 'error');
      signinBtn.disabled = true;
      signupBtn.disabled = true;
      return;
    }

    var client;
    try {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (err) {
      setStatus('Failed to initialise the auth client: ' + err.message, 'error');
      signinBtn.disabled = true;
      signupBtn.disabled = true;
      return;
    }

    // Per Z9H governance: TOKEN_REFRESHED events must be suppressed —
    // they fire routinely and are not something the UI should react to.
    try {
      client.auth.onAuthStateChange(function (event) {
        if (event === 'TOKEN_REFRESHED') return;
        if (event === 'SIGNED_IN') {
          // no-op here; explicit redirect happens in the submit handlers
        }
      });
    } catch (err) {
      // Non-fatal — auth state listener failing shouldn't block the form.
      console.warn('Auth state listener failed to attach:', err);
    }

    // ---- Sign in ----
    formSignin.addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('signin-email').value.trim();
      var password = document.getElementById('signin-password').value;

      if (!email || !password) {
        setStatus('Enter your email and password.', 'error');
        return;
      }

      setStatus('');
      setLoading(signinBtn, true, 'Enter Mission Control', 'Signing In\u2026');

      withTimeout(client.auth.signInWithPassword({ email: email, password: password }))
        .then(function (result) {
          if (result.error) throw result.error;
          setStatus('Access granted. Redirecting\u2026', 'success');
          window.location.href = REDIRECT_URL;
        })
        .catch(function (err) {
          setStatus(err.message || 'Sign in failed. Check your details and try again.', 'error');
        })
        .finally(function () {
          setLoading(signinBtn, false, 'Enter Mission Control', 'Signing In\u2026');
        });
    });

    // ---- Create account ----
    formSignup.addEventListener('submit', function (e) {
      e.preventDefault();
      var name = document.getElementById('signup-name').value.trim();
      var email = document.getElementById('signup-email').value.trim();
      var password = document.getElementById('signup-password').value;
      var confirm = document.getElementById('signup-confirm').value;

      if (!name || !email || !password || !confirm) {
        setStatus('Fill in every field to create an account.', 'error');
        return;
      }
      if (password.length < 6) {
        setStatus('Password must be at least 6 characters.', 'error');
        return;
      }
      if (password !== confirm) {
        setStatus('Passwords do not match.', 'error');
        return;
      }

      setStatus('');
      setLoading(signupBtn, true, 'Deploy Account', 'Creating Account\u2026');

      withTimeout(client.auth.signUp({
        email: email,
        password: password,
        options: { data: { display_name: name } }
      }))
        .then(function (result) {
          if (result.error) throw result.error;

          // If email confirmation is enabled in Supabase Auth settings,
          // there will be no active session yet — tell the user to check
          // their inbox instead of trying to redirect.
          if (result.data && result.data.session) {
            setStatus('Account created. Redirecting\u2026', 'success');
            window.location.href = REDIRECT_URL;
          } else {
            setStatus('Account created. Check your email to confirm before signing in.', 'success');
          }
        })
        .catch(function (err) {
          setStatus(err.message || 'Account creation failed. Try again.', 'error');
        })
        .finally(function () {
          setLoading(signupBtn, false, 'Deploy Account', 'Creating Account\u2026');
        });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
